# Generation Timestamp: 2026-04-10T04:00:00Z
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Syntax check
        run: |
          python -m py_compile astral-memory/__init__.py
          python -m py_compile astral-memory/schemas.py
          python -m py_compile astral-memory/tools.py
          echo "All files compile successfully"

      - name: Import check
        run: |
          cd astral-memory
          python -c "
          import schemas
          assert hasattr(schemas, 'ASTRAL_RECALL')
          assert hasattr(schemas, 'ASTRAL_STORE')
          assert hasattr(schemas, 'ASTRAL_DIARY')
          print('Schema imports OK: 7 tool schemas found')
          "

      - name: Verify plugin.yaml
        run: |
          python -c "
          import yaml
          with open('astral-memory/plugin.yaml') as f:
              manifest = yaml.safe_load(f)
          assert manifest['name'] == 'astral-memory'
          assert len(manifest['provides_tools']) == 7
          assert len(manifest['provides_hooks']) == 3
          print(f'Manifest OK: {manifest[\"name\"]} v{manifest[\"version\"]}')
          print(f'  Tools: {manifest[\"provides_tools\"]}')
          print(f'  Hooks: {manifest[\"provides_hooks\"]}')
          "
